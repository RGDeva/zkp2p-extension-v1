<!-- Open this in a browser, right-click each canvas, "Save image as" icon-{size}.png -->
<!-- Or we generate them programmatically below -->
<canvas id="c128" width="128" height="128"></canvas>
<canvas id="c48" width="48" height="48"></canvas>
<canvas id="c32" width="32" height="32"></canvas>
<canvas id="c16" width="16" height="16"></canvas>
<script>
function draw(id, size) {
  const c = document.getElementById(id);
  const ctx = c.getContext('2d');
  // Rounded dark background
  const r = size * 0.15;
  ctx.beginPath();
  ctx.moveTo(r, 0); ctx.lineTo(size-r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size-r);
  ctx.quadraticCurveTo(size, size, size-r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size-r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = '#111111';
  ctx.fill();
  // Emerald X
  ctx.strokeStyle = '#10b981';
  ctx.lineWidth = size * 0.13;
  ctx.lineCap = 'round';
  const p = size * 0.25;
  ctx.beginPath(); ctx.moveTo(p, p); ctx.lineTo(size-p, size-p); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(size-p, p); ctx.lineTo(p, size-p); ctx.stroke();
}
draw('c128', 128); draw('c48', 48); draw('c32', 32); draw('c16', 16);
</script>
